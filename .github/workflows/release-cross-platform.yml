name: Release Cross-Platform Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output_name: Mouser_Windows.exe
          - os: ubuntu-latest
            output_name: Mouser_Linux
          - os: macos-latest
            output_name: Mouser_macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk portaudio19-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed main.py `
            --add-data "shared;shared" `
            --add-data "experiment_pages;experiment_pages" `
            --add-data "ui;ui" `
            --add-data "settings;settings" `
            --collect-all customtkinter `
            --hidden-import darkdetect `
            --name "Mouser_Windows"

      - name: Build Linux/macOS executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            APP_NAME="Mouser_Linux"
          else
            APP_NAME="Mouser_macOS"
          fi

          pyinstaller --noconfirm --clean --onefile --windowed main.py \
            --add-data "shared:shared" \
            --add-data "experiment_pages:experiment_pages" \
            --add-data "ui:ui" \
            --add-data "settings:settings" \
            --collect-all customtkinter \
            --hidden-import darkdetect \
            --name "$APP_NAME"

          chmod +x "dist/$APP_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
